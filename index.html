<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/social.png" type="image/x-icon">
    <title>Github Issue Tracker | Login</title>

    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <main class="min-h-screen bg-[#F8FAFC] flex items-center justify-center">
        <div class="w-[550px] p-8 rounded-lg bg-[#FFFFFF] border border-[#FFFFFF] shadow-[0px_5px_10px_rgba(0,0,0,0.08)] space-y-6">
            <div class="flex flex-col items-center justify-center">
                <img src="./assets/github-logo.png" alt="GitHub Logo">
                <h1 class="geist-font font-semibold text-[24px] leading-[auto] tracking-[0%] text-[#1F2937] mt-6 mb-1">GitHub Issues Tracker</h1>
                <p class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%] text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <div class="flex flex-col items-center justify-start">
                <fieldset class="w-full">
                    <div class="flex flex-col items-start">
                        <label class="label geist-font font-medium text-[16px] leading-[auto] tracking-[0%] text-[#1F2937]">Username</label>
                        <input id="input-username" value="admin" type="text" class="input w-full p-4 rounded-lg bg-[#FFFFFF] border border-[#E4E4E7] geist-font font-normal text-[16px] leading-4 tracking-[0%] text-[#71717A] mt-2 mb-1.5 outline-none" placeholder="Enter Username" />
                        <p class="geist-font font-normal text-[14px] leading-[auto] tracking-[0%] text-[#4A00FF]">Default: admin</p>
                    </div>
                    <div class="flex flex-col items-start mt-4 mb-6">
                        <label class="label geist-font font-medium text-[16px] leading-[auto] tracking-[0%] text-[#1F2937]">Password</label>
                        <input id="input-password" value="admin123" type="password" class="input w-full p-4 rounded-lg bg-[#FFFFFF] border border-[#E4E4E7] geist-font font-normal text-[16px] leading-4 tracking-[0%] text-[#71717A] mt-2 mb-1.5 outline-none" placeholder="Enter Password" />
                        <p class="geist-font font-normal text-[14px] leading-[auto] tracking-[0%] text-[#4A00FF]">Default: admin123</p>
                    </div>
                    <div>
                        <button id="sign-in-button" class="btn w-full p-4 rounded-lg bg-[#4A00FF] geist-font font-semibold text-[16px] leading-4 tracking-[0%] text-[#FFFFFF]">Sign In</button>
                    </div>
                </fieldset>
            </div>
            <div class="flex justify-between items-center">
                <hr class="w-[220px] border border-[#E4E4E7]">
                <span class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%]">OR</span>
                <hr class="w-[220px] border border-[#E4E4E7]">
            </div>
            <div class="flex flex-col justify-center items-center gap-2">
                <p class="geist-font font-normal text-[14px] leading-[auto] tracking-[0%] text-[#64748B]">Demo Credentials:</p>
                <div class="w-full flex flex-col items-center p-6 rounded-lg bg-[#F8FAFC]">
                    <p class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%] text-[#64748B]"><span class="font-semibold text-[#1F2937]">Username: </span>admin</p>
                    <p class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%] text-[#64748B]"><span class="font-semibold text-[#1F2937]">Password: </span>admin123</p>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="./scripts/login.js"></script>
</body>
</html>
