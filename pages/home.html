<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home</title>

    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/afae3d2134.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/style.css">

<body>
    <header>
        <div class="navbar px-20 py-4 bg-[#F8FAFC] shadow-sm">
            <div class="flex-1 px-1">
                <a href="#" class="btn btn-ghost text-xl">
                    <img src="../assets/github-logo.png" alt="Navbar Logo" class="w-9">
                    <p class="geist-font font-semibold text-[24px] leading-[auto] tracking-[0%] text-[#1F2937]">GitHub Issues Tracker</p>
                </a>
            </div>
            <div class="flex gap-2 items-center">
                <div>
                    <label class="input outline-none border border-[#E4E4E7] bg-[#FFFFFF] rounded-sm">
                        <svg class="h-[1em] opacity-50 geist-font font-normal text-[16px] leading-4 tracking-[0%] text-[#64748B]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="text" class="grow geist-font font-normal text-[16px] leading-4 tracking-[0%] text-[#64748B]" placeholder="Search Issues..." />
                    </label>
                </div>
                <div>
                    <button class="btn px-4 py-3 geist-font font-semibold text-[14px] leading-[auto] tracking-[0%] rounded-sm">Search</button>
                </div>
                <div>
                    <button class="btn px-4 py-3 geist-font font-semibold text-[14px] leading-[auto] tracking-[0%] rounded-sm bg-[#4A00FF] text-[#FFFFFF]">+ New Issue</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="min-h-screen bg-[#F8FAFC] px-[245px] py-[60px] space-y-4">
            <div class="p-6 rounded-lg bg-[#FFFFFF] border border-[#FFFFFF] shadow-[0px_1px_6px_rgba(0,0,0,0.08)] space-x-2">
                <button id="all-button" class="btn w-[120px] px-3 py-2 rounded-sm bg-[#FFFFFF] border border-[#E4E4E7] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#64748B]">All</button>
                <button id="open-button" class="btn w-[120px] px-3 py-2 rounded-sm bg-[#FFFFFF] border border-[#E4E4E7] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#64748B]">Open</button>
                <button id="closed-button" class="btn w-[120px] px-3 py-2 rounded-sm bg-[#FFFFFF] border border-[#E4E4E7] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#64748B]">Closed</button>
            </div>

            <div class="shadow-[0px_5px_10px_rgba(0,0,0,0.08)]">
                <div class="py-6 px-6 bg-[#FFFFFF] border-b border-[#E4E4E7] flex items-center justify-between rounded-t-lg">
                    <div class="flex items-center justify-center gap-4">
                        <div class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center">
                            <img src="../assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h1 id="all-count" class="geist-font font-semibold text-[20px] leading-[auto] tracking-[0%] text-[#1F2937]"><span id="all-issue-count"></span> Issues</h1>
                            <h1 id="open-count" class="geist-font font-semibold text-[20px] leading-[auto] tracking-[0%] text-[#1F2937]"><span id="open-issue-count"></span> Issues</h1>
                            <h1 id="closed-count" class="geist-font font-semibold text-[20px] leading-[auto] tracking-[0%] text-[#1F2937]"><span id="closed-issue-count"></span> Issues</h1>
                            <p class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%] text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-center gap-4">
                        <div class="flex items-center justify-center gap-2">
                            <div aria-label="success" class="status status-success"></div>
                            <p class="geist-font font-medium text-[16px] leading-[auto] tracking-[0%] text-[#64748B]">Open</p>
                        </div>
                        <div class="flex items-center justify-center gap-2">
                            <div aria-label="status" class="status status-primary"></div>
                            <p class="geist-font font-medium text-[16px] leading-[auto] tracking-[0%] text-[#64748B]">Closed</p>
                        </div>
                    </div>
                </div>

                <div class="bg-[#FBFBFB] px-6 py-6 rounded-b-lg">

                    <div id="loading-container" class="flex items-center justify-center">
                        <span class="loading loading-dots loading-xl"></span>
                    </div>

                    <div id="all-issues-container" class="grid grid-cols-4 gap-3">

                        <!-- <div id="card" class="issue-card bg-[#FFFFFF] border-t-4 border-[#00A96E] rounded-sm shadow-[0px_3px_6px_rgba(0,0,0,0.08)]">
                            <div class="border-b border-b-[#E4E4E7] p-4 space-y-4">
                                <div class="flex items-center justify-between">

                                        ${issue.priority === "high" || issue.priority === "medium" ? `<img src="../assets/Open-Status.png" alt="Open Status" class="w-6 h-6">` : `<img src="../assets/Closed- Status .png" alt="Closed Status" class="w-6 h-6">`}
                                    </div>
                                    <div>
                                        ${issue.priority === "high" ? `<p class="w-20 px-3 py-2 bg-[#FEECEC] flex items-center justify-center rounded-[100px] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#EF4444] uppercase">${issue.priority}</p>` : ${issue.priority === "medium" ? `<p class="w-20 px-3 py-2 bg-[#FEF3C7] flex items-center justify-center rounded-[100px] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#D97706] uppercase">${issue.priority}</p>` : `<p class="w-20 px-3 py-2 bg-[#ECFDF5] flex items-center justify-center rounded-[100px] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#059669] uppercase">${issue.priority}</p>`}}
                                    </div>
                                    <p class="w-24 px-3 py-2 flex items-center justify-center rounded-[100px] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#EF4444] uppercase">HIGH</p>
                                </div>
                                <div>
                                    <h1 class="geist-font font-semibold text-[20px] leading-[auto] tracking-[0%] text-[#000000]">Fix navigation menu on mobile devices</h1>
                                    <p class="geist-font font-normal text-[16px] leading-[auto] tracking-[0%] text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices...</p>
                                </div>
                                <div class="flex items-center gap-1 flex-wrap">
                                    <div class="badge badge-xl p-2 rounded-[100px] bg-[#FEECEC] border border-[#FECACA] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#EF4444]"><i class="fa-solid fa-bug"></i>BUG</div>
                                    <div class="badge badge-xl p-2 rounded-[100px] bg-[#FFF8DB] border border-[#FDE68A] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#D97706]"><i class="fa-solid fa-life-ring"></i>HELP WANTED</div>
                                    <div class="badge badge-xl p-2 rounded-[100px] bg-[#DEFCE8] border border-[#BBF7D0] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#16A34A]"><i class="fa-solid fa-wand-magic-sparkles"></i>ENHANCEMENT</div>
                                    <div class="badge badge-xl p-2 rounded-[100px] bg-[#FBCEB1] border border-[#FFBF00] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#D27D2D]"><i class="fa-solid fa-circle-exclamation"></i>GOOD FIRST ISSUE</div>
                                    <div class="badge badge-xl p-2 rounded-[100px] bg-[#F0FFFF] border border-[#0096FF] geist-font font-medium text-[16px] leading-[100%] tracking-[0%] text-[#00008B]"><i class="fa-solid fa-file-lines"></i>DOCUMENTATION</div>
                                </div>
                            </div>
                            <div class="p-4 space-y-2">
                                <div class="flex items-center justify-between">
                                    <p class="geist-font font-normal text-[18px] leading-[auto] tracking-[0%] text-[#64748B]">#1 by john_doe</p>
                                    <p class="geist-font font-normal text-[18px] leading-[auto] tracking-[0%] text-[#64748B]">1/15/2024</p>
                                </div>
                                <div class="flex items-center justify-between">
                                    <p class="geist-font font-normal text-[18px] leading-[auto] tracking-[0%] text-[#64748B]">Assignee: </p>
                                    <p class="geist-font font-normal text-[18px] leading-[auto] tracking-[0%] text-[#64748B]">Updated: </p>
                                </div>
                            </div>
                        </div> -->

                    </div>

                    <div id="open-issues-container" class="grid grid-cols-4 gap-3 hidden">

                    </div>

                    <div id="closed-issues-container" class="grid grid-cols-4 gap-3 hidden">

                    </div>


                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="../scripts/allissues.js"></script>
